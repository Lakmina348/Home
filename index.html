<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading... | Lakmina</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: #050a18;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        .loader-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top: 3px solid #00d2ff;
            border-bottom: 3px solid #3a7bd5;
            animation: spin 0.5s linear infinite; /* ඉතා වේගයෙන් කැරකේ */
        }

        .logo-l {
            font-size: 110px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px #fff, 0 0 40px #00d2ff;
            animation: pulsate 0.5s infinite alternate;
            user-select: none;
        }

        .percentage {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #00d2ff;
            letter-spacing: 2px;
        }

        .btn-group { display: flex; gap: 20px; }

        .btn {
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            color: white;
            text-transform: uppercase;
        }

        .whatsapp { background: linear-gradient(45deg, #25d366, #128c7e); }
        .telegram { background: linear-gradient(45deg, #0088cc, #005580); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulsate { 100% { text-shadow: 0 0 20px #00d2ff; } 0% { text-shadow: 0 0 5px #fff; } }

        .fade-out { animation: fadeOut 0.3s forwards; }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="loader-ring"></div>
        <div class="logo-l">L</div>
    </div>

    <div class="percentage" id="count">0%</div>

    <div class="btn-group">
        <a href="https://wa.me/94788637885" class="btn whatsapp">WhatsApp</a>
        <a href="https://t.me/94788637885" class="btn telegram">Telegram</a>
    </div>

    <script>
        const targetUrl = "HOME.html"; 
        const countElement = document.getElementById('count');
        
        let count = 0;
        // ඉතා වේගයෙන් ඉලක්කම් වැඩි වේ (තත්පරයකට අඩු කාලයකින් 100% වේ)
        const countInterval = setInterval(() => {
            count += 2; // වේගය වැඩි කිරීමට 2 බැගින් එකතු වේ
            if (count > 100) count = 100;
            countElement.innerText = count + "%";
            if (count >= 100) clearInterval(countInterval);
        }, 8); 

        // මිලි තත්පර 800 කින් (තත්පර 0.8) පිටුව මාරු වේ
        setTimeout(() => {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 200); 
        }, 800);
    </script>

</body>
</html>
